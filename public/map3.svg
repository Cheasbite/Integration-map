<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#fafafa"></rect>
  <rect x="20" y="20" width="460" height="460" fill="none" stroke="#222" stroke-width="8"></rect>

  <!-- Zig-zag corridor -->
  <path d="M60 60
           H220
           V180
           H120
           V320
           H320
           V420
           H440" fill="none" stroke="#ddd" stroke-width="70" stroke-linejoin="round" stroke-linecap="round"></path>

  <!-- Rooms -->
  <rect x="20" y="20" width="120" height="120" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="260" y="20" width="220" height="120" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="20" y="180" width="120" height="120" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="340" y="180" width="140" height="140" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="20" y="340" width="220" height="140" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="300" y="360" width="180" height="120" fill="#fff" stroke="#222" stroke-width="4"></rect>

  <!-- Door openings -->
  <line x1="140" y1="85" x2="140" y2="105" stroke="#fff" stroke-width="8"></line>
  <line x1="260" y1="85" x2="260" y2="105" stroke="#fff" stroke-width="8"></line>
  <line x1="140" y1="240" x2="140" y2="260" stroke="#fff" stroke-width="8"></line>
  <line x1="340" y1="250" x2="340" y2="270" stroke="#fff" stroke-width="8"></line>
  <line x1="240" y1="390" x2="240" y2="410" stroke="#fff" stroke-width="8"></line>
  <line x1="300" y1="410" x2="300" y2="430" stroke="#fff" stroke-width="8"></line>
</svg>