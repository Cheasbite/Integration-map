<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#f7f7f7"></rect>
  <rect x="20" y="20" width="460" height="460" fill="none" stroke="#222" stroke-width="8"></rect>

  <!-- Horizontal corridor -->
  <rect x="20" y="210" width="460" height="80" fill="#fff"></rect>

  <!-- Vertical corridor -->
  <rect x="210" y="20" width="80" height="460" fill="#fff"></rect>

  <!-- Corner rooms -->
  <rect x="20" y="20" width="190" height="190" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="290" y="20" width="190" height="190" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="20" y="290" width="190" height="190" fill="#fff" stroke="#222" stroke-width="4"></rect>
  <rect x="290" y="290" width="190" height="190" fill="#fff" stroke="#222" stroke-width="4"></rect>

  <!-- Center room -->
  <rect x="175" y="175" width="150" height="150" fill="#fff" stroke="#222" stroke-width="4"></rect>

  <!-- Doors -->
  <line x1="110" y1="210" x2="140" y2="210" stroke="#fff" stroke-width="8"></line>
  <line x1="360" y1="210" x2="390" y2="210" stroke="#fff" stroke-width="8"></line>
  <line x1="110" y1="290" x2="140" y2="290" stroke="#fff" stroke-width="8"></line>
  <line x1="360" y1="290" x2="390" y2="290" stroke="#fff" stroke-width="8"></line>
</svg>